@if(toys().length > 0) {
<div class="card-wrapper">
    @for (t of toys(); track $index){
    <mat-card class="toy-card" appearance="outlined">
        <img mat-card-image [src]="utils.getImageUrl(t)" [alt]="t.name">
        <mat-card-content class="card-content">
            <mat-card-title>
                <strong>{{t.name}}</strong>
            </mat-card-title>
            <mat-card-subtitle>{{t.type.name}} | {{t.ageGroup.name}} god.</mat-card-subtitle>
        </mat-card-content>
        <mat-card-actions>
            <a [routerLink]="'/details/' + t.toyId" matButton>
                <mat-icon fontIcon="description" /> Detalji
            </a>
            @if(authService.getActiveUser()){
            <a [routerLink]="'/details/' + t.toyId + '/reserve'" matButton>
                <mat-icon fontIcon="add_shopping_cart" /> Rezerviši
            </a>
            }
        </mat-card-actions>
    </mat-card>
    }
</div>
}
@else {
<app-loading />
}
