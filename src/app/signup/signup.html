<mat-card class="small-card">
    <mat-card-header>
        <h1>Registracija</h1>
    </mat-card-header>
    <mat-card-content>
        <mat-form-field class="full-width">
            <mat-label>Ime</mat-label>
            <input matInput type="text" [(ngModel)]="user.firstName">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Prezime</mat-label>
            <input matInput type="text" [(ngModel)]="user.lastName">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="user.email">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Lozinka</mat-label>
            <input matInput type="password" [(ngModel)]="user.password">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Potvrda lozinke</mat-label>
            <input matInput type="password" [(ngModel)]="password2">
        </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" matButton (click)="doSignup()">
            <mat-icon fontIcon="person_add" /> Registruj se
        </button>
        <a routerLink="/login" matButton>
            <mat-icon fontIcon="login" /> Već imam nalog
        </a>
    </mat-card-actions>
</mat-card>
